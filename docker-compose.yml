services:
  postgres:
    image: postgres:17
    container_name: abyss-postgres
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - wal_compression=lz4
      - -c
      - max_wal_size=2GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - synchronous_commit=off
    environment:
      POSTGRES_USER: abyss
      POSTGRES_PASSWORD: ${ABYSS_PG_PASSWORD:?set ABYSS_PG_PASSWORD in .env}
      POSTGRES_DB: abyss
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - abyss_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abyss -d abyss"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  abyss_pg:
